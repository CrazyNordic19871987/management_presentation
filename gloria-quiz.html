<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИнноСити: Хранитель города — интерактивный квест</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --deep-blue: #0B1A33;
            --mint: #00C48C;
            --mint-light: rgba(0, 196, 140, 0.1);
            --mint-glow: rgba(0, 196, 140, 0.3);
            --gold: #FFB800;
            --gold-light: rgba(255, 184, 0, 0.1);
            --pure-white: #FFFFFF;
            --soft-gray: #F5F7FA;
            --text-dim: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 196, 140, 0.15);
            --card-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--deep-blue);
            color: var(--pure-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .game-card {
            max-width: 680px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            padding: 32px 24px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0, 196, 140, 0.2);
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--mint) 0%, #00A878 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 28px;
            color: var(--deep-blue);
            box-shadow: 0 10px 20px -5px var(--mint-glow);
            letter-spacing: -1px;
        }

        .brand-text {
            flex: 1;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .brand-tagline {
            font-size: 13px;
            font-weight: 400;
            color: var(--mint);
            letter-spacing: 0.3px;
            opacity: 0.9;
            font-family: 'JetBrains Mono', monospace;
        }

        .oracle-presence {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            position: relative;
        }

        .oracle-eye {
            width: 80px;
            height: 80px;
            background: var(--mint-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 16px;
            border: 2px solid var(--mint);
            box-shadow: 0 0 30px var(--mint-glow);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .oracle-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .story-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .story-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--mint);
            border-radius: 4px 0 0 4px;
        }

        #storyText {
            font-size: 18px;
            line-height: 1.7;
            font-weight: 400;
            color: var(--pure-white);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .choices-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .choice-item {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--glass-border);
            border-radius: 100px;
            padding: 18px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            font-weight: 500;
            color: var(--pure-white);
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .choice-item:hover {
            background: var(--mint);
            border-color: var(--mint);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px var(--mint-glow);
        }

        .choice-item:active {
            transform: translateY(0);
        }

        .choice-item.primary-action {
            background: var(--mint);
            border-color: var(--mint);
            font-weight: 600;
            justify-content: center;
            text-align: center;
        }

        .choice-item.primary-action:hover {
            background: #00b37e;
            box-shadow: 0 20px 40px -10px var(--mint);
        }

        .restart-wrapper {
            text-align: center;
            margin-top: 20px;
        }

        #restartBtn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 40px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        #restartBtn:hover {
            color: var(--gold);
            background: var(--gold-light);
        }

        .game-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
        }

        .game-footer span {
            color: var(--mint);
            font-weight: 500;
        }

        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: var(--mint);
            width: 24px;
            border-radius: 12px;
        }

        @media (max-width: 480px) {
            .game-card {
                padding: 24px 16px;
                border-radius: 32px;
            }

            .brand-icon {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }

            .brand-name {
                font-size: 24px;
            }

            .story-container {
                padding: 24px 20px;
            }

            #storyText {
                font-size: 16px;
            }

            .choice-item {
                padding: 16px 24px;
                font-size: 16px;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .choice-emoji {
            font-size: 22px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--mint);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            border: 1px solid var(--mint);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-link:hover {
            background: var(--mint);
            color: var(--deep-blue);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← К презентации</a>

        };

        function updateProgress(sceneId) {
            const progressDots = document.getElementById('progressIndicator');
            progressDots.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                progressDots.appendChild(dot);
            }
        }

        function updateGame() {
            const scene = scenes[gameState.currentScene];
            if (!scene) return;

            const storyEl = document.getElementById('storyText');
            storyEl.style.opacity = '0';
            storyEl.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                storyEl.innerText = scene.text;
                storyEl.style.opacity = '1';
                storyEl.style.transform = 'translateY(0)';
            }, 150);

            const choicesContainer = document.getElementById('choicesContainer');
            choicesContainer.innerHTML = '';

            if (scene.choices && scene.choices.length > 0) {
                scene.choices.forEach((choice) => {
                    const button = document.createElement('button');
                    button.className = 'choice-item';
                    
                    if (choice.emoji) {
                        button.innerHTML = `<span class="choice-emoji">${choice.emoji}</span> ${choice.text}`;
                    } else {
                        button.innerText = choice.text;
                    }
                    
                    if (choice.desc) {
                        const span = document.createElement('span');
                        span.style.marginLeft = '8px';
                        span.style.fontSize = '14px';
                        span.style.opacity = '0.7';
                        span.style.fontWeight = '400';
                        span.innerText = `· ${choice.desc}`;
                        button.appendChild(span);
                    }
                    
                    button.onclick = () => {
                        gameState.currentScene = choice.next;
                        gameState.path.push(choice.next);
                        updateGame();
                    };
                    choicesContainer.appendChild(button);
                });
            } else if (scene.isFinal) {
                const registerBtn = document.createElement('button');
                registerBtn.className = 'choice-item primary-action';
                registerBtn.innerHTML = '✧ Записаться в лагерь ✧';
                registerBtn.onclick = () => {
                    window.location.href = 'index.html';
                };
                choicesContainer.appendChild(registerBtn);
            }

            updateProgress(gameState.currentScene);
        }

        document.getElementById('restartBtn').addEventListener('click', () => {
            gameState = {
                currentScene: 'intro',
                path: []
            };
            updateGame();
        });

        updateGame();
        document.getElementById('gameCard').classList.add('fade-in');
    </script>
</body>
</html>
