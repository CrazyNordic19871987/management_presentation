<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИнноСити: Хранитель города</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --deep-blue: #0B1A33;
            --mint: #00C48C;
            --gold: #FFB800;
            --white: #FFFFFF;
            --red: #FF6B6B;
            --purple: #A855F7;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--deep-blue);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Start Screen */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--deep-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: transform 0.8s ease;
        }

        #startScreen.hidden {
            transform: translateY(-100%);
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--mint), var(--gold), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 50px rgba(0, 196, 140, 0.5);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .game-subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 20px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--mint), #00A878);
            border: none;
            border-radius: 50px;
            color: var(--deep-blue);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 196, 140, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 50px rgba(0, 196, 140, 0.6);
        }

        /* Game Container */
        #gameContainer {
            position: relative;
            width: 900px;
            height: 600px;
            border: 3px solid var(--mint);
            border-radius: 20px;
            overflow: hidden;
            background: linear-gradient(180deg, #0a0f1a 0%, var(--deep-blue) 100%);
            box-shadow: 0 0 50px rgba(0, 196, 140, 0.3);
        }

        /* Canvas */
        #gameCanvas {
            display: block;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--mint);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .hud-item span {
            color: var(--gold);
        }

        /* Mission Panel */
        #missionPanel {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            max-width: 80%;
            text-align: center;
        }

        #missionPanel h3 {
            color: var(--gold);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 5px;
        }

        #missionPanel p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* Oracle Dialog */
        #oracleDialog {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(168, 85, 247, 0.2);
            border: 2px solid var(--purple);
            border-radius: 20px;
            padding: 20px 30px;
            max-width: 70%;
            text-align: center;
            display: none;
        }

        #oracleDialog.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        #oracleDialog .oracle-avatar {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        #oracleDialog p {
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .controls kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 3px;
        }

        /* Department Selection */
        #departmentSelect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 26, 51, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        #departmentSelect.hidden {
            display: none;
        }

        #departmentSelect h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--mint);
            margin-bottom: 30px;
        }

        .dept-options {
            display: flex;
            gap: 20px;
        }

        .dept-btn {
            width: 180px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .dept-btn:hover {
            transform: translateY(-10px);
            border-color: var(--mint);
            box-shadow: 0 15px 30px rgba(0, 196, 140, 0.3);
        }

        .dept-btn .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .dept-btn .name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--white);
        }

        /* Victory Screen */
        #victoryScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 26, 51, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
        }

        #victoryScreen.hidden {
            display: none;
        }

        #victoryScreen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 20px;
            animation: victoryPulse 1s ease-in-out infinite;
        }

        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #victoryScreen .role {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        #victoryScreen p {
            font-size: 1.2rem;
            max-width: 500px;
            text-align: center;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        #victoryScreen .restart-btn {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            background: var(--mint);
            border: none;
            border-radius: 30px;
            color: var(--deep-blue);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #victoryScreen .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 196, 140, 0.4);
        }

        .victory-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .victory-buttons .camp-btn {
            padding: 15px 35px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--gold), #ff9500);
            border: none;
            border-radius: 30px;
            color: var(--deep-blue);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .victory-buttons .camp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 184, 0, 0.4);
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--mint);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            border: 1px solid var(--mint);
            transition: all 0.3s;
            z-index: 1000;
        }

        .back-link:hover {
            background: var(--mint);
            color: var(--deep-blue);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← К презентации</a>

    <!-- Start Screen -->
    <div id="startScreen">
        <h1 class="game-title">ИнноСити</h1>
        <p class="game-subtitle">Хранитель города</p>
        <button class="start-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

    <!-- Game Container -->
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        
        <!-- UI -->
        <div id="ui">
            <div class="hud">
                <div class="hud-item">HP: <span id="hpDisplay">❤️❤️❤️</span></div>
                <div class="hud-item">XP: <span id="xpDisplay">0</span></div>
                <div class="hud-item">Уровень: <span id="levelDisplay">1</span></div>
            </div>
            
            <div id="oracleDialog">
                <div class="oracle-avatar">👁️</div>
                <p id="oracleText">Привет, Хранитель!</p>
            </div>
            
            <div id="missionPanel">
                <h3>📍 Миссия</h3>
                <p id="missionText">Найди Оракула в центре города</p>
            </div>
        </div>

        <!-- Department Selection -->
        <div id="departmentSelect" class="hidden">
            <h2>Выбери свой путь</h2>
            <div class="dept-options">
                <div class="dept-btn" onclick="chooseDepartment('engineer')">
                    <div class="icon">🏗️</div>
                    <div class="name">Инженерный</div>
                </div>
                <div class="dept-btn" onclick="chooseDepartment('digital')">
                    <div class="icon">💻</div>
                    <div class="name">Цифровой</div>
                </div>
                <div class="dept-btn" onclick="chooseDepartment('eco')">
                    <div class="icon">🌱</div>
                    <div class="name">Эко-лаб</div>
                </div>
                <div class="dept-btn" onclick="chooseDepartment('media')">
                    <div class="icon">📸</div>
                    <div class="name">Новости</div>
                </div>
            </div>
        </div>

        <!-- Victory Screen -->
        <div id="victoryScreen" class="hidden">
            <h1>ПОБЕДА!</h1>
            <div class="role" id="finalRole">🏆</div>
            <p id="finalText">Ты спас город Глория!</p>
            <div class="victory-buttons">
                <button class="restart-btn" onclick="restartGame()">ИГРАТЬ СНОВА</button>
                <a href="index.html" class="camp-btn">К ПРЕЗЕНТАЦИИ</a>
            </div>
        </div>
    </div>

    <div class="controls">
        Управление: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> или <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> | <kbd>Пробел</kbd> - действие
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        let game = {
            started: false,
            phase: 'explore',
            department: null,
            hp: 3,
            xp: 0,
            level: 1,
            mission: 0,
            player: { x: 450, y: 500, size: 30, speed: 5 },
            keys: {},
            npcs: [],
            collectibles: [],
            particles: []
        };

        // Game Objects
        const buildings = [
            { x: 100, y: 80, w: 150, h: 100, color: '#1a3a5c', name: 'Штаб' },
            { x: 650, y: 80, w: 150, h: 100, color: '#1a3a5c', name: 'Лаборатория' },
            { x: 100, y: 350, w: 120, h: 80, color: '#2d4a3e', name: 'Эко-зона' },
            { x: 680, y: 350, w: 120, h: 80, color: '#3d2d4a', name: 'Медиа-центр' },
            { x: 350, y: 200, w: 200, h: 150, color: '#4a3a1a', name: 'ОРАКУЛ', isOracle: true }
        ];

        const npcTypes = {
            engineer: { emoji: '👷', mission: 'Почини вентиляцию', xp: 50 },
            digital: { emoji: '👨‍💻', mission: 'Найди вирус', xp: 50 },
            eco: { emoji: '🧑‍🔬', mission: 'Собери пробы', xp: 50 },
            media: { emoji: '📸', mission: 'Сделай репортаж', xp: 50 }
        };

        function initNPCs() {
            game.npcs = [
                { x: 175, y: 150, type: 'engineer', completed: false },
                { x: 725, y: 150, type: 'digital', completed: false },
                { x: 160, y: 400, type: 'eco', completed: false },
                { x: 740, y: 400, type: 'media', completed: false },
                { x: 450, y: 300, type: 'oracle', completed: false }
            ];
        }

        document.addEventListener('keydown', (e) => {
            game.keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' || e.key === 'Enter') interact();
        });
        document.addEventListener('keyup', (e) => game.keys[e.key.toLowerCase()] = false);

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            game.started = true;
            initNPCs();
            showOracle('Хранитель! Город Глория в опасности. Найди представителей 4х отделов и выполни их задания. Потом возвращайся ко мне!');
            gameLoop();
        }

        function showOracle(text) {
            const dialog = document.getElementById('oracleDialog');
            document.getElementById('oracleText').textContent = text;
            dialog.classList.add('show');
            setTimeout(() => dialog.classList.remove('show'), 4000);
        }

        function chooseDepartment(dept) {
            game.department = dept;
            document.getElementById('departmentSelect').classList.add('hidden');
            showOracle('Отлично! Теперь найди представителей всех отделов и помоги им. Начни с того, который тебе ближе!');
            updateMission();
        }

        function updateMission() {
            const missions = [
                'Найди представителей 4x отделов',
                'Выполни миссии отделов',
                'Вернись к Оракулу'
            ];
            document.getElementById('missionText').textContent = missions[game.mission];
        }

        function interact() {
            const player = game.player;
            
            game.npcs.forEach(npc => {
                const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
                if (dist < 60 && !npc.completed) {
                    if (npc.type === 'oracle') {
                        if (game.xp >= 200) {
                            showVictory();
                        } else {
                            showOracle('Сначала выполни все миссии отделов! Тебе нужно ' + (200 - game.xp) + ' XP.');
                        }
                    } else if (game.department) {
                        npc.completed = true;
                        const xpGain = npcTypes[npc.type].xp;
                        game.xp += xpGain;
                        game.level = Math.floor(game.xp / 50) + 1;
                        createParticles(npc.x, npc.y, '#FFD700');
                        showOracle('Миссия выполнена! +' + xpGain + ' XP');
                        updateDisplay();
                        
                        const allDone = game.npcs.filter(n => n.type !== 'oracle').every(n => n.completed);
                        if (allDone) {
                            game.mission = 2;
                            updateMission();
                        }
                    } else {
                        showOracle('Сначала выбери своё отделение!');
                        document.getElementById('departmentSelect').classList.remove('hidden');
                    }
                }
            });

            game.collectibles = game.collectibles.filter(c => {
                const dist = Math.hypot(player.x - c.x, player.y - c.y);
                if (dist < 30) {
                    game.xp += 10;
                    createParticles(c.x, c.y, '#00C48C');
                    updateDisplay();
                    return false;
                }
                return true;
            });
        }

        function showVictory() {
            game.phase = 'victory';
            const screen = document.getElementById('victoryScreen');
            screen.classList.remove('hidden');
            
            const roles = {
                engineer: { icon: '🛠️', text: 'Ты стал МАСТЕРОМ-СБОРЩИКОМ! Воплощаешь идеи в жизнь! Приходи летом в лагерь ИнноСити!' },
                digital: { icon: '💻', text: 'Ты стал РАЗРАБОТЧИКОМ! Пишешь код для города! Приходи летом в лагерь ИнноСити!' },
                eco: { icon: '🔬', text: 'Ты стал ЛАБОРАНТОМ! Проводишь важные опыты! Приходи летом в лагерь ИнноСити!' },
                media: { icon: '📸', text: 'Ты стал РЕПОРТЁРОМ! Рассказываешь истории города! Приходи летом в лагерь ИнноСити!' }
            };
            
            const role = roles[game.department] || roles.engineer;
            document.getElementById('finalRole').textContent = role.icon;
            document.getElementById('finalText').textContent = role.text;
        }

        function restartGame() {
            location.reload();
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                game.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 30,
                    color
                });
            }
        }

        function updateDisplay() {
            document.getElementById('hpDisplay').textContent = '❤️'.repeat(game.hp);
            document.getElementById('xpDisplay').textContent = game.xp;
            document.getElementById('levelDisplay').textContent = game.level;
        }

        function gameLoop() {
            if (!game.started) return;
            
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (game.phase === 'victory') return;

            const player = game.player;
            const speed = player.speed;

            if (game.keys['w'] || game.keys['arrowup']) player.y -= speed;
            if (game.keys['s'] || game.keys['arrowdown']) player.y += speed;
            if (game.keys['a'] || game.keys['arrowleft']) player.x -= speed;
            if (game.keys['d'] || game.keys['arrowright']) player.x += speed;

            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            if (Math.random() < 0.02 && game.collectibles.length < 5) {
                game.collectibles.push({
                    x: 100 + Math.random() * 700,
                    y: 100 + Math.random() * 400,
                    type: 'xp'
                });
            }

            game.particles = game.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
        }

        function render() {
            ctx.fillStyle = '#0B1A33';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(0, 196, 140, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            buildings.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = b.isOracle ? '#A855F7' : '#00C48C';
                ctx.lineWidth = b.isOracle ? 3 : 2;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
                
                ctx.fillStyle = '#fff';
                ctx.font = '12px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText(b.name, b.x + b.w/2, b.y - 10);
            });

            game.npcs.forEach(npc => {
                ctx.font = '35px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (npc.completed) {
                    ctx.shadowColor = '#00C48C';
                    ctx.shadowBlur = 20;
                }
                ctx.fillText(npcTypes[npc.type]?.emoji || '👁️', npc.x, npc.y);
                ctx.shadowBlur = 0;
            });

            game.collectibles.forEach(c => {
                ctx.font = '25px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⭐', c.x, c.y);
            });

            ctx.fillStyle = '#00C48C';
            ctx.beginPath();
            ctx.arc(game.player.x, game.player.y, game.player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧑', game.player.x, game.player.y);

            game.particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        render();
    </script>
</body>
</html>
